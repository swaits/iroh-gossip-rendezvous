version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch-updates:
        update-types: [patch]

  - package-ecosystem: cargo
    directory: /fuzz
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
